name: DriveFort AI CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    env:
      DRIVEFORT_ALLOW_MOCK: "1"
      DRIVEFORT_COMMAND_SECRET: "ci-command-secret-not-for-production"
      DRIVEFORT_OTA_SECRET: "ci-ota-secret-not-for-production"
      DRIVEFORT_OTA_DEMO_SIGNING: "1"
      DRIVEFORT_INCIDENT_DB: "data/ci-drivefort-incidents.db"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Compile Python sources
        run: python -m compileall -q app.py src tests

      - name: Run automated tests
        run: pytest -q

      - name: Run standalone API verification
        run: python verify_drivefort_v3.py
